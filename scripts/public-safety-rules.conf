PUBLIC_SAFETY_FORBIDDEN_PATTERNS=(
  "/Users/"
  "/www/wwwroot"
  "macOS Keychain:"
)

PUBLIC_SAFETY_SECRET_PATTERNS=(
  '-----BEGIN (RSA |OPENSSH |EC |DSA |PRIVATE )?PRIVATE KEY-----'
  'sk-[A-Za-z0-9_-]{20,}'
  'gh[pousr]_[A-Za-z0-9_]{20,}'
  'xox[baprs]-[A-Za-z0-9-]{20,}'
  'AKIA[0-9A-Z]{16}'
  'password[[:space:]]*=[[:space:]]*["'\''][^"'\'']+["'\'']'
  'DATABASE_URL[[:space:]]*='
  'api[_-]?key[[:space:]]*=[[:space:]]*["'\''][^"'\'']+["'\'']'
  'token[[:space:]]*=[[:space:]]*["'\''][^"'\'']+["'\'']'
)

